# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
# include:
#   - board: seeeduino_xiao_ble
#     shield: corne_central_dongle
#   - board: nice_nano_v2
#     shield: corne_central_dongle
#   - board: nice_nano_v2
#     shield: corne_central_left
#   - board: nice_nano_v2
#     shield: corne_peripheral_left
#   - board: nice_nano_v2
#     shield: corne_peripheral_right
#   - board: nice_nano_v2
#     shield: settings_reset
#   - board: seeeduino_xiao_ble
#     shield: settings_reset
include:
  - board: nice_nano_v2
    shield: mriya_left nice_view_adapter nice_view_gem
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: mriya_right nice_view_adapter nice_view_gem
  - board: nice_nano_v2
    shield: settings_reset
